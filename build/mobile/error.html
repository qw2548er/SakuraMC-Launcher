<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>加载失败</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #1a0f2e 0%, #2d1b4e 50%, #0f0f1a 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
            color: #ffb7d5;
            padding: 20px;
        }
        .container {
            text-align: center;
            max-width: 400px;
        }
        .icon {
            font-size: 60px;
            margin-bottom: 20px;
        }
        h1 {
            font-size: 20px;
            margin-bottom: 12px;
            font-weight: 500;
        }
        p {
            font-size: 14px;
            opacity: 0.8;
            line-height: 1.6;
            margin-bottom: 8px;
        }
        .info {
            margin-top: 20px;
            padding: 12px;
            background: rgba(255, 183, 213, 0.1);
            border-radius: 8px;
            font-size: 12px;
            opacity: 0.7;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon">😢</div>
        <h1>应用加载失败</h1>
        <p>抱歉，应用启动时遇到了问题</p>
        <p>请尝试关闭应用后重新打开</p>
        <div class="info">
            错误码: init_failed<br>
            版本: 0.1.2
        </div>
    </div>
</body>
</html>
