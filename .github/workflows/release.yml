name: 构建发布

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-h5:
    name: 构建 H5 版本
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 安装依赖
        run: npm install --legacy-peer-deps

      - name: 构建 H5
        run: npm run build:h5

      - name: 打包 H5
        run: |
          cd dist/build/h5
          VERSION=${GITHUB_REF_NAME#v}
          zip -r "../../SakuraMC-Launcher-${VERSION}-H5.zip" .
          ls -lh ../../

      - name: 上传 H5 构建产物
        uses: actions/upload-artifact@v4
        with:
          name: h5-zip
          path: dist/SakuraMC-Launcher-*.zip

  build-desktop:
    name: 构建桌面版 (Windows)
    needs: build-h5
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 下载 H5 构建产物
        uses: actions/download-artifact@v4
        with:
          name: h5-zip

      - name: 解压 H5 到 web 目录
        run: |
          mkdir -p build/desktop/web
          Expand-Archive -Path "SakuraMC-Launcher-*-H5.zip" -DestinationPath "build/desktop/web" -Force

      - name: 安装 Electron 依赖
        working-directory: build/desktop
        run: npm install

      - name: 构建 Windows 版
        working-directory: build/desktop
        run: npm run dist:win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 上传桌面版产物
        uses: actions/upload-artifact@v4
        with:
          name: desktop-windows
          path: build/desktop/release/*.exe

  build-android:
    name: 构建 Android APK
    needs: build-h5
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 设置 JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 下载 H5 构建产物
        uses: actions/download-artifact@v4
        with:
          name: h5-zip

      - name: 解压 H5 到 www 目录
        run: |
          mkdir -p build/mobile/www
          unzip -o SakuraMC-Launcher-*-H5.zip -d build/mobile/www

      - name: 复制错误页
        run: cp build/mobile/error.html build/mobile/www/error.html

      - name: 安装 Cordova
        run: npm install -g cordova

      - name: 安装 WebView 优化插件
        working-directory: build/mobile
        run: cordova plugin add ./cordova-plugin-webview-config --no-interactive

      - name: 安装 Android SDK
        uses: android-actions/setup-android@v3

      - name: 构建 APK
        working-directory: build/mobile
        run: |
          cordova platform add android@13 --no-interactive
          cordova build android --debug

      - name: 重命名 APK
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          cp build/mobile/platforms/android/app/build/outputs/apk/debug/app-debug.apk "SakuraMC-Launcher-${VERSION}-android.apk"
          ls -lh SakuraMC-Launcher-*.apk

      - name: 上传 APK
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: SakuraMC-Launcher-*.apk

  release:
    name: 创建 GitHub Release
    needs: [build-desktop, build-android]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: 下载桌面版
        uses: actions/download-artifact@v4
        with:
          name: desktop-windows
          path: release

      - name: 下载 APK
        uses: actions/download-artifact@v4
        with:
          name: android-apk
          path: release

      - name: 下载 H5
        uses: actions/download-artifact@v4
        with:
          name: h5-zip
          path: release

      - name: 列文件
        run: ls -lh release/

      - name: 创建 Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }} - 樱花 MC 启动器
          body: |
            ## 🌸 樱花 MC 启动器 ${{ github.ref_name }}

            跨平台 Minecraft Java 版启动器 + 完整樱花穿透控制台

            ### 📦 下载

            | 平台 | 文件 | 说明 |
            |------|------|------|
            | 🪟 Windows 安装版 | `SakuraMC-Launcher-*-setup.exe` | 需安装 |
            | 🪟 Windows 便携版 | `SakuraMC-Launcher-*-x64-portable.exe` | 免安装, 直接运行 |
            | 📱 Android | `SakuraMC-Launcher-*-android.apk` | Android 5.0+ |
            | 🌐 H5 网页版 | `SakuraMC-Launcher-*-H5.zip` | 浏览器直接用 |

            ### ✨ 本版本更新

            - 🌊 **沉浸式全屏体验** - 状态栏和导航栏透明，内容延伸到全屏
            - 📱 **刘海屏/全面屏适配** - 支持安全区域，内容不会被挖孔遮挡
            - 🎨 **消除割裂感** - 应用背景与系统栏融为一体，视觉更统一
            - ✨ **硬件加速渲染** - 启用 GPU 硬件加速，滑动更流畅
            - 🔧 **禁用过度滚动** - 移除 WebView 边缘弹性效果

            ### ✨ 主要功能

            - ✅ 微软账号 / 离线账号 登录管理
            - ✅ 游戏版本管理 (Vanilla / Forge / Fabric / Quilt)
            - ✅ 服务器管理 + SLP 在线状态查询
            - ✅ Mod / 资源包 / 存档 管理
            - ✅ 🌸 樱花穿透 完整控制台 (登录/节点/隧道/流量)
            - ✅ frpc 配置文件生成
            - ✅ 启动参数自定义
            - ✅ 玻璃态 UI + 樱花粉紫主题

            ### 📱 手机版说明

            手机端可以管理樱花穿透隧道、查看服务器状态、生成启动命令，但无法直接启动 Minecraft Java 版游戏（需要 PC 端）。

            ### 💡 所有版本由 GitHub Actions 自动构建
          files: |
            release/*
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
